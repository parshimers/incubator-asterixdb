# The user name for data generation.
user: ec2-user

# The home directory.
home_dir: "/home/{{ user }}"

data_zip_url: "https://s3-us-west-2.amazonaws.com/asterixdb-boss/bossdata.tar.bz"

# The location for generated data.
data_dir: "{{ home_dir }}/bossdata"
